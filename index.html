<!DOCTYPE html>
<html>
<head>
<title>Ultimate Quiz Game</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    margin:0;
    color:white;
    background-size:cover;
    background-position:center;
    transition:0.5s;
}
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(-45deg,#1a1a2eaa,#16213eaa,#0f3460aa,#533483aa);
    background-size:400% 400%;
    animation:bgMove 10s infinite;
    top:0;
    left:0;
    z-index:-1;
}
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
.box{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    width:450px;
    margin:80px auto;
}
button{
    display:block;
    width:90%;
    margin:10px auto;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#4a74b5,#5f8dd3);
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover{transform:scale(1.05);}
.correct{background:green !important;}
.wrong{background:red !important;}
#timerBar{background:#333;border-radius:10px;overflow:hidden;}
#timerFill{height:6px;background:#00ffcc;width:100%;}
#adminBtn{position:fixed;top:10px;left:10px;width:auto;}
#musicToggle{position:fixed;top:10px;right:10px;width:auto;}
input{padding:10px;width:85%;margin:5px;}
#popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    background:black;
    color:#00fff7;
    padding:20px 40px;
    border-radius:10px;
    box-shadow:0 0 15px #00fff7;
    opacity:0;
    transition:0.3s;
}
#popup.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>

<button id="adminBtn" onclick="openAdmin()">👑 Admin</button>
<button id="musicToggle" onclick="toggleMusic()">🎵</button>

<div id="popup"></div>

<div class="box" id="startScreen">
    <h2>Enter Name</h2>
    <input id="playerName">
    <button onclick="startGame()">Start Game</button>
</div>

<div class="box" id="quizScreen" style="display:none;">
    <h3 id="timer"></h3>
    <div id="timerBar"><div id="timerFill"></div></div>
    <h2 id="question"></h2>
    <div id="answersBox"></div>
</div>

<div class="box" id="adminLogin" style="display:none;">
    <h2>Admin Login</h2>
    <input id="adminPass" type="password">
    <button onclick="checkAdmin()">Login</button>
</div>

<div class="box" id="adminPanel" style="display:none;">
    <h2>Admin Panel</h2>

    <input id="qText" placeholder="Question">
    <input id="opt1" placeholder="Option 1">
    <input id="opt2" placeholder="Option 2">
    <input id="opt3" placeholder="Option 3">
    <input id="opt4" placeholder="Option 4">
    <input id="correctAns" placeholder="Correct Answer">

    <button onclick="addQuestion()">➕ Add Quiz</button>
    <button onclick="editQuestion()">✏️ Edit Selected</button>
    <button style="background:red" onclick="deleteQuestion()">❌ Delete</button>

    <h3>Click Question to Edit</h3>
    <div id="questionList"></div>

    <button onclick="goHome()">Back</button>
</div>

<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://files.catbox.moe/d2cjfw.m4a"></audio>

<script>
// ================= JSONBIN =================
const BIN_ID = "69c0f07bb7ec241ddc93ff79 ";
const API_KEY = "$2a$10$kfY1WVfSDsvhUgF1ggGpY.xVPzZF136Lw3tluE6Yh0LezJ30Y96mS";

async function getData(){
    let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
        headers:{ "X-Master-Key": API_KEY }
    });
    let data = await res.json();
    return data.record || {questions:[], leaderboard:[]};
}

async function saveData(data){
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            "X-Master-Key":API_KEY
        },
        body:JSON.stringify(data)
    });
}

// ================= GAME =================
let quiz=[],i=0,score=0,userAnswers=[],timer,t=10,selectedIndex=null;

async function startGame(){
    if(!playerName.value){showPopup("Enter name");return;}

    setRandomBackground();

    let data = await getData();
    quiz = data.questions;

    if(quiz.length===0){
        quiz=[{question:"Test?",answers:["Yes","No"],correct:"Yes"}];
    }

    startScreen.style.display="none";
    quizScreen.style.display="block";

    i=0;score=0;userAnswers=[];
    nextQ();
}

function nextQ(){
    setRandomBackground();
    clearInterval(timer);
    t=10;

    timer=setInterval(()=>{
        timer.innerText="Time:"+t;
        timerFill.style.width=(t/10)*100+"%";
        t--;
        if(t<0){
            clearInterval(timer);
            userAnswers.push("No Answer");
            next();
        }
    },1000);

    let q=quiz[i];
    question.innerText=q.question;

    answersBox.innerHTML=q.answers.map(a=>
        `<button onclick="check('${a}')">${a}</button>`
    ).join("");
}

function check(ans){
    let btns=document.querySelectorAll("#answersBox button");

    btns.forEach(b=>{
        if(b.innerText===quiz[i].correct)b.classList.add("correct");
        if(b.innerText===ans && ans!==quiz[i].correct)b.classList.add("wrong");
        b.disabled=true;
    });

    userAnswers.push(ans);

    if(ans===quiz[i].correct){score++;correctSound.play();}
    else{wrongSound.play();}

    setTimeout(next,1000);
}

function next(){
    i++;
    if(i<quiz.length)nextQ();
    else endGame();
}

// ================= LEADERBOARD =================
async function saveScore(){
    let data = await getData();

    data.leaderboard.push({
        name:playerName.value,
        score:score
    });

    // sort highest first
    data.leaderboard.sort((a,b)=>b.score-a.score);

    // keep top 10
    data.leaderboard = data.leaderboard.slice(0,10);

    await saveData(data);
}

async function showLeaderboard(){
    let data = await getData();

    let html = "<h2>🏆 Leaderboard</h2>";

    data.leaderboard.forEach((p,i)=>{
        html+=`<div>${i+1}. ${p.name} - ${p.score}</div>`;
    });

    question.innerHTML += html;
}

async function endGame(){
    let percent=Math.round((score/quiz.length)*100);

    await saveScore();

    let html=`<h2>${score}/${quiz.length}</h2><h3>${percent}%</h3>`;

    quiz.forEach((q,idx)=>{
        let user=userAnswers[idx]||"No Answer";
        let ok=user===q.correct;

        html+=`<div style="background:${ok?'green':'red'};margin:10px;padding:10px;border-radius:10px;">
        ${q.question}<br>
        You: ${user} ${ok?'✅':'❌'}<br>
        Correct: ${q.correct}
        </div>`;
    });

    question.innerHTML=html;
    answersBox.innerHTML="";

    await showLeaderboard();
}

// ================= ADMIN =================
async function loadAdmin(){
    let data = await getData();
    let q = data.questions;

    questionList.innerHTML=q.map((item,i)=>`
    <div onclick="selectQuestion(${i})"
    style="border:2px solid ${i===selectedIndex?'#6a5af9':'#ccc'};
    margin:10px;padding:10px;border-radius:10px;">
    <b>${item.question}</b><br>
    ${item.answers.map(a=>`• ${a}`).join("<br>")}
    <br><span style="color:lime">✔ ${item.correct}</span>
    </div>
    `).join("");
}

async function selectQuestion(i){
    let data = await getData();
    let item = data.questions[i];

    selectedIndex=i;

    qText.value=item.question;
    opt1.value=item.answers[0]||"";
    opt2.value=item.answers[1]||"";
    opt3.value=item.answers[2]||"";
    opt4.value=item.answers[3]||"";
    correctAns.value=item.correct;

    loadAdmin();
}

async function addQuestion(){
    let data = await getData();

    data.questions.push({
        question:qText.value,
        answers:[opt1.value,opt2.value,opt3.value,opt4.value].filter(a=>a!=""),
        correct:correctAns.value
    });

    await saveData(data);

    showPopup("Added!");
    loadAdmin();
}

async function editQuestion(){
    if(selectedIndex===null)return showPopup("Select one");

    let data = await getData();

    data.questions[selectedIndex]={
        question:qText.value,
        answers:[opt1.value,opt2.value,opt3.value,opt4.value].filter(a=>a!=""),
        correct:correctAns.value
    };

    await saveData(data);

    showPopup("Updated!");
    loadAdmin();
}

async function deleteQuestion(){
    if(selectedIndex===null)return showPopup("Select one");

    let data = await getData();

    data.questions.splice(selectedIndex,1);

    await saveData(data);

    selectedIndex=null;
    showPopup("Deleted!");
    loadAdmin();
}

// ================= UI =================
function openAdmin(){
    startScreen.style.display="none";
    adminLogin.style.display="block";
}
function checkAdmin(){
    if(adminPass.value==="tylor"){
        adminLogin.style.display="none";
        adminPanel.style.display="block";
        loadAdmin();
    }else showPopup("Wrong password");
}
function goHome(){
    adminPanel.style.display="none";
    startScreen.style.display="block";
}

// ================= EXTRAS =================
const backgrounds=[
"https://files.catbox.moe/36rpa7.jpg",
"https://files.catbox.moe/sca4v4.jpg",
"https://files.catbox.moe/ri4psa.jpg",
"https://files.catbox.moe/md9t5u.jpg"
];

function setRandomBackground(){
    document.body.style.backgroundImage=
    `url(${backgrounds[Math.floor(Math.random()*backgrounds.length)]})`;
}

function showPopup(msg){
    popup.innerText=msg;
    popup.classList.add("show");
    setTimeout(()=>popup.classList.remove("show"),2000);
}

let musicOn=false;
function toggleMusic(){
    musicOn=!musicOn;
    if(musicOn){bgMusic.play();showPopup("Music ON")}
    else{bgMusic.pause();showPopup("Music OFF")}
}
</script>

</body>
</html>
